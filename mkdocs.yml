site_name: MGTT — Model Guided Troubleshooting Tool
site_url: https://mgt-tool.github.io/mgtt
repo_url: https://github.com/mgt-tool/mgtt
repo_name: mgt-tool/mgtt
docs_dir: docs

# Wire the {{ MGTT_VERSION }} placeholder so docs source the version
# from the repo's VERSION file at build time — no manual sync.
hooks:
  - docs/_hooks/version_substitute.py
  - docs/_hooks/registry_generator.py

theme:
  name: material
  logo: images/mgtt_icon_medium.png
  favicon: images/mgtt_icon_32px.png
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Install: getting-started/install.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
    - Simulation: concepts/simulation.md
    - Troubleshooting: concepts/troubleshooting.md
    - Multi-File Models: concepts/multi-file-models.md
    - Using Providers: concepts/using-providers.md
    - Provider Install Methods: concepts/provider-install-methods.md
    - Provider Names and Versions: concepts/provider-fqn-and-versions.md
  - Writing Providers:
    - Overview: providers/overview.md
    - Vocabulary: providers/vocabulary.md
    - Binary Protocol: providers/protocol.md
    - Install Hooks: providers/hooks.md
    - Testing: providers/testing.md
  - Reference:
    - CLI: reference/cli.md
    - Configuration: reference/configuration.md
    - Model Schema: reference/model-schema.md
    - Scenario Schema: reference/scenario-schema.md
    - Type Catalog: reference/type-catalog.md
    - Specification: reference/spec.md
    - Provider Registry: reference/registry.md
    - Provider Capabilities: reference/image-capabilities.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
