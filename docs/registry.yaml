providers:
  kubernetes:
    url: https://github.com/mgt-tool/mgtt-provider-kubernetes
    description: Kubernetes cluster resources via kubectl
    tags:
      - workloads
      - networking
      - scaling
      - storage
      - cluster
      - prerequisites
      - rbac
      - webhooks
      - extensibility
  aws:
    url: https://github.com/mgt-tool/mgtt-provider-aws
    description: AWS managed services via aws-cli
    tags:
      - databases
      - compute
      - messaging
      - storage
  docker:
    url: https://github.com/sajonaro/mgtt-provider-docker
    description: Docker containers via docker inspect
    tags:
      - containers
  terraform:
    url: https://github.com/mgt-tool/mgtt-provider-terraform
    description: Terraform-managed infrastructure — state health, drift detection, config-vs-reality reasoning
    tags:
      - iac
      - terraform
      - drift
  tempo:
    url: https://github.com/mgt-tool/mgtt-provider-tempo
    # image: ghcr.io/mgt-tool/mgtt-provider-tempo:0.2.0@sha256:<digest>  # once v0.2.0 is published
    description: Per-span SLO checks against Grafana Tempo — current_p99, breach_duration, error_rate
    tags:
      - tracing
      - otel
      - grafana
      - slo
  quickwit:
    url: https://github.com/mgt-tool/mgtt-provider-quickwit
    description: Cross-span tracing checks against Quickwit — transaction_flow, async_hop, consumer_health
    tags:
      - tracing
      - otel
      - quickwit
      - slo
      - async
