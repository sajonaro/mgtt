name: docs-registry-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/_hooks/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs mkdocs-material pyyaml
      - name: Build site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mkdocs build --strict
